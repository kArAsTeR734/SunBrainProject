services:
  frontend:
    build:
      context: ./SunBrainFrontend
      dockerfile: Dockerfile.prod.prod
    container_name: sunbrain_frontend
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:80"
    depends_on:
      - backend

  backend:
    build:
      context: ./SunBrainBackend
      dockerfile: Dockerfile.prod.prod
    container_name: sunbrain_backend
    restart: unless-stopped
    env_file:
      - ./SunBrainBackend/.env.production
    ports:
      - "127.0.0.1:5000:5000"
    depends_on:
      - db

  db:
    image: postgres:18-alpine
    container_name: sunbrain_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: SunBrain_dev
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: root
    volumes:
      - postgres18_data:/var/lib/postgresql

volumes:
  postgres18_data: