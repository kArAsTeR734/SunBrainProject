services:
  frontend:
    build:
      context: ./SunBrainFrontend
      dockerfile: Dockerfile.dev
    container_name: sunbrain_frontend
    ports:
      - "3000:3000"
    volumes:
      - ./SunBrainFrontend:/app
      - frontend_node_modules:/app/node_modules
    depends_on:
      - backend
    environment:
      - VITE_API_URL=http://localhost:5000
    command: npm run dev -- --host 0.0.0.0 --port 3000

  backend:
    build:
      context: ./SunBrainBackend
      dockerfile: Dockerfile.dev
    container_name: sunbrain_backend
    ports:
      - "5000:5000"
    volumes:
      - ./SunBrainBackend:/app
      - backend_node_modules:/app/node_modules
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - ./SunBrainBackend/.env
    command: npm run dev

  db:
    image: postgres:18-alpine
    container_name: sunbrain_db
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=SunBrain_dev
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=root
    volumes:
      - postgres18_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d SunBrain_dev"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

volumes:
  postgres18_data:
  frontend_node_modules:
  backend_node_modules:
