services:
  frontend:
    build:
      context: ./SunBrainFrontend
      dockerfile: Dockerfile.dev
    container_name: sunbrain_frontend
    ports:
      - "3000:3000"
    volumes:
      - ./SunBrainFrontend:/app
      - frontend_node_modules:/app/node_modules
    depends_on:
      - backend
    environment:
      - VITE_API_URL=http://localhost:5000

  backend:
    build:
      context: ./SunBrainBackend
      dockerfile: Dockerfile.dev
    container_name: sunbrain_backend
    ports:
      - "5000:5000"
    volumes:
      - ./SunBrainBackend:/app
      - backend_node_modules:/app/node_modules
    depends_on:
      - db
    env_file:
      - ./SunBrainBackend/.env

  db:
    image: postgres:16-alpine
    container_name: sunbrain_db
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=SunBrain_dev
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=root
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
  frontend_node_modules:
  backend_node_modules: